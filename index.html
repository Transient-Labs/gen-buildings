<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Buildings</title>
    <style>
        html,
        body {
            margin: 0;
            height: 100%;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            /* Stop long-press from selecting the canvas/iframe on mobile */
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        canvas {
            display: block;
            max-width: 100vw;
            max-height: 100vh;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
    <!--
      Load order is determinism-critical:
        1. art.js (sets window.$art and seeds synchronously at load)
        2. the sketch below (consumes $art, which is already ready)
    -->
    <script src="art.js"></script>
</head>

<body>
    <script>
        const WINDOW_COUNT = 1000; // reg_windows/window-1.png ... window-1000.png

        // Grid size distribution (weights sum to 100) — bell curve around 6x6.
        const GRID_SIZES = [
            { n: 3, weight: 20 },
            { n: 4, weight: 20 },
            { n: 6, weight: 20 },
            { n: 8, weight: 20 },
            { n: 12, weight: 20 },
        ];

        // Windows are native 4:5 tiles (600x750) and tile edge-to-edge with NO
        // gutter, so the grid is GRID*600 x GRID*750 — perfectly 4:5 at any size.
        // W/H/cellW/cellH are set once GRID is known, just below.
        const CELL_W = 600; // native window width
        const CELL_H = 750; // native window height
        // Snapshot renders at full native resolution; the live canvas caps its
        // height (the display is scaled to fit the screen anyway, so rendering a
        // 9000px-tall 12x12 live would be wasted pixels and could choke mobile).
        const LIVE_MAX_H = 4500;

        console.log("$art seed:", $art.getSeed());

        function weightedPick(options) {
            let r = $art.random(100);
            for (const opt of options) {
                r -= opt.weight;
                if (r < 0) return opt;
            }
            return options[options.length - 1];
        }

        const GRID = weightedPick(GRID_SIZES).n;
        // LAYOUT trait: a building-style name per grid size.
        const LAYOUTS = { 3: "BROWNSTONE", 4: "WALK UP", 6: "PRE WAR", 8: "TOWER", 12: "HIGH RISE" };

        // Edge-to-edge tiling: cell == source window. Full native res for the
        // snapshot; downscaled for live playback only when the grid is large.
        // A mouse means the user can right-click "Save Image As", so render the
        // live buffer at full native resolution there too; pure-touch devices
        // (no right-click anyway) keep the perf cap.
        const hasMouse = !!(window.matchMedia && window.matchMedia("(any-pointer: fine)").matches);
        const liveScale = ($art.captureMode || hasMouse) ? 1 : Math.min(1, LIVE_MAX_H / (GRID * CELL_H));
        const cellW = Math.round(CELL_W * liveScale);
        const cellH = Math.round(CELL_H * liveScale);
        const W = GRID * cellW;
        const H = GRID * cellH;

        // Window selection (picks), reveal order, and per-window sway params are
        // computed inside the fetch().then below — the special-building branch
        // needs special_building_counts.json first. All those seeded draws run
        // there in a fixed order (after GRID, the only synchronous draw), so
        // determinism is preserved despite the data being fetched.

        const canvas = document.createElement("canvas");
        canvas.width = W;
        canvas.height = H;
        document.body.appendChild(canvas);
        const ctx = canvas.getContext("2d");

        function loadImage(src) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = () => reject(new Error("failed to load " + src));
                img.src = src;
            }).then((img) =>
                // Fully decode now and keep the decoded pixels as an
                // ImageBitmap; otherwise the browser decodes lazily and the
                // first zoom-in stalls ~100ms re-rasterizing at full size.
                img
                    .decode()
                    .then(() => (window.createImageBitmap ? createImageBitmap(img) : img))
                    .catch(() => img)
            );
        }

        // ---- reveal animation (frame-counter driven, not wall-clock) ----
        const FPS = 60;
        const TOTAL_FRAMES = 2 * FPS; // whole reveal ~2s
        const POP_FRAMES = 36; // each window's pop ~0.6s

        // Underdamped pop: starts fast, overshoots ~1.1, rebounds to 1.
        function easeOutBack(t) {
            const c1 = 1.70158;
            const c3 = c1 + 1;
            return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
        }

        // Load the special-building table + per-window data (relative paths: sit
        // next to index.html locally and in the IPFS mint dir). On any failure,
        // each falls back to {} so the piece still renders (special falls through
        // to a normal build; derived traits degrade to None/Balanced). ALL seeded
        // draws happen inside this .then in a fixed order, after GRID.
        Promise.all([
            fetch("special_building_counts.json").then((r) => r.json()).catch(() => ({})),
            fetch("windows_keyed.json").then((r) => r.json()).catch(() => ({})),
        ]).then(([SPECIAL, KEYED]) => {
            const cells = GRID * GRID;

            // Per-color window-id pools from the keyed data (deterministic; no
            // $art draws). Used by the structured "Rainbow" special building.
            const colorPools = {}; // color -> [window ids], ascending
            for (const key in KEYED) {
                const c = KEYED[key].color;
                if (!c) continue;
                (colorPools[c] || (colorPools[c] = [])).push(Number(key.split("-")[1]));
            }
            const RAINBOW = (SPECIAL.Rainbow && SPECIAL.Rainbow.colors) || null;

            // Rainbow is structured (not a flat pool): restricted to 6x6 / 8x8,
            // where the colors cycle per-row (each row is one color). The grid<=4
            // per-window branch below is retained but currently unreachable.
            function rainbowReq(grid) {
                const need = {};
                for (const c of RAINBOW) need[c] = 0;
                if (grid <= 4) {
                    for (let i = 0; i < grid * grid; i++) need[RAINBOW[i % RAINBOW.length]]++;
                } else {
                    for (let r = 0; r < grid; r++) need[RAINBOW[r % RAINBOW.length]] += grid;
                }
                return need;
            }
            function rainbowQualifies(grid) {
                if (!RAINBOW) return false;
                if (grid !== 6 && grid !== 8) return false; // rainbow only on 6x6 / 8x8
                const need = rainbowReq(grid); // each color must have enough unique windows
                return RAINBOW.every((c) => (colorPools[c] || []).length >= need[c]);
            }
            // Seeded: pick each color's quota of unique windows (partial
            // Fisher-Yates, fixed color order), then lay them out by cell/row.
            function buildRainbow(grid) {
                const need = rainbowReq(grid);
                const bag = {};
                for (const c of RAINBOW) {
                    const p = (colorPools[c] || []).slice();
                    for (let i = 0; i < need[c]; i++) {
                        const j = i + $art.randomInt(0, p.length - 1 - i);
                        [p[i], p[j]] = [p[j], p[i]];
                    }
                    bag[c] = { list: p, idx: 0 };
                }
                const out = new Array(grid * grid);
                if (grid <= 4) {
                    for (let i = 0; i < grid * grid; i++) {
                        const c = RAINBOW[i % RAINBOW.length];
                        out[i] = bag[c].list[bag[c].idx++];
                    }
                } else {
                    for (let r = 0; r < grid; r++) {
                        const c = RAINBOW[r % RAINBOW.length];
                        for (let gx = 0; gx < grid; gx++) out[r * grid + gx] = bag[c].list[bag[c].idx++];
                    }
                }
                return out;
            }

            // ~25% of builds are a "special building". Count-based specials draw
            // `cells` windows from one flat pool; Rainbow uses its own builder.
            const SPECIAL_PROB = 0.25;
            let specialName = "No"; // trait value; building name when special
            let isRainbow = false;
            let picks = null;

            if ($art.randomBool(SPECIAL_PROB)) {
                const qualified = Object.keys(SPECIAL).filter((n) =>
                    SPECIAL[n].builder === "rainbow" ? rainbowQualifies(GRID) : SPECIAL[n].count >= cells
                );
                if (qualified.length) {
                    specialName = $art.randomElement(qualified); // equal chance among qualified
                    if (SPECIAL[specialName].builder === "rainbow") {
                        isRainbow = true;
                        picks = buildRainbow(GRID);
                    } else {
                        const pool = SPECIAL[specialName].windows.slice();
                        // partial Fisher-Yates: first `cells` entries become the picks
                        for (let i = 0; i < cells; i++) {
                            const j = i + $art.randomInt(0, pool.length - 1 - i);
                            [pool[i], pool[j]] = [pool[j], pool[i]];
                        }
                        picks = pool.slice(0, cells);
                    }
                }
            }

            // Normal build (or special fell through): unique random window ids.
            if (!picks) {
                picks = [];
                const seen = new Set();
                while (picks.length < cells) {
                    const n = $art.randomInt(1, WINDOW_COUNT);
                    if (seen.has(n)) continue;
                    seen.add(n);
                    picks.push(n);
                }
            }

            // Reveal order: Fisher-Yates shuffle of cell indices.
            const revealOrder = picks.map((_, i) => i);
            for (let i = revealOrder.length - 1; i > 0; i--) {
                const j = $art.randomInt(0, i);
                [revealOrder[i], revealOrder[j]] = [revealOrder[j], revealOrder[i]];
            }

            // Per-window sway + swell parameters for the "alive" state
            // (fractions of cell size; speeds in radians/frame). Last draws.
            const floats = picks.map(() => ({
                ax: $art.random(0.01, 0.022),
                ay: $art.random(0.014, 0.03),
                sx: $art.random(0.008, 0.02),
                sy: $art.random(0.008, 0.02),
                px: $art.random(0, Math.PI * 2),
                py: $art.random(0, Math.PI * 2),
                // scale swelling ("breathing"): each window inflates/deflates a
                // few percent at its own rate and phase
                as: $art.random(0.02, 0.05),
                ss: $art.random(0.006, 0.016),
                ps: $art.random(0, Math.PI * 2),
            }));

            // ---- derived traits from the composing windows (deterministic;
            // no $art draws, so the seeded order above is unaffected) ----
            let primaryColor = "None";
            let circadianCycle = "Balanced";
            {
                const colorCount = {};
                let awake = 0, asleep = 0;
                for (const n of picks) {
                    const w = KEYED["window-" + n];
                    if (!w) continue; // defensive: missing data won't crash
                    if (w.color) colorCount[w.color] = (colorCount[w.color] || 0) + 1;
                    if (w.circadian === "awake") awake++;
                    else if (w.circadian === "asleep") asleep++;
                }
                // Primary Color: the most abundant color among the windows (Title
                // Case). Ties resolve to the first-seen color (deterministic, since
                // iteration follows window order). "None" only if no color data.
                let topColor = null, topN = 0;
                for (const c in colorCount) {
                    if (colorCount[c] > topN) { topN = colorCount[c]; topColor = c; }
                }
                if (topColor) {
                    primaryColor = topColor[0].toUpperCase() + topColor.slice(1);
                }
                if (isRainbow) primaryColor = "None"; // a rainbow has no single primary color
                // Circadian Cycle: > 50% awake/asleep, else "Balanced" (exact tie).
                if (awake / cells > 0.5) circadianCycle = "Mostly Awake";
                else if (asleep / cells > 0.5) circadianCycle = "Mostly Asleep";
            }

            Promise.all(picks.map((n) => loadImage(`final_windows/window-${n}.webp`))).then((images) => {
                const count = GRID * GRID;

                // Stagger pop starts across the reveal window so the last pop
                // finishes at TOTAL_FRAMES, regardless of grid size.
                const span = TOTAL_FRAMES - POP_FRAMES;
                const startFrame = new Array(count);
                revealOrder.forEach((cell, order) => {
                    startFrame[cell] = count > 1 ? Math.round((order / (count - 1)) * span) : 0;
                });

                function render(frame) {
                    ctx.fillStyle = "#000";
                    ctx.fillRect(0, 0, W, H);

                    for (let gy = 0; gy < GRID; gy++) {
                        for (let gx = 0; gx < GRID; gx++) {
                            const i = gy * GRID + gx;
                            const t = (frame - startFrame[i]) / POP_FRAMES;
                            if (t < 0) continue; // not revealed yet

                            // easeOutBack(0) === 0, so windows scale continuously from/to
                            // nothing rather than appearing at a fixed minimum size.
                            const scale = t >= 1 ? 1 : easeOutBack(t);
                            if (scale <= 0) continue;

                            const x = gx * cellW;
                            const y = gy * cellH;
                            const cx = x + cellW / 2;
                            const cy = y + cellH / 2;
                            ctx.drawImage(
                                images[i],
                                cx - (cellW * scale) / 2,
                                cy - (cellH * scale) / 2,
                                cellW * scale,
                                cellH * scale
                            );
                        }
                    }
                }

                function finish() {
                    // Mint pipeline: traits + snapshot, AFTER the final frame is drawn.
                    $art.setTraits({
                        "LAYOUT": LAYOUTS[GRID],
                        "ARCHETYPE": specialName.toUpperCase(),
                        "COLORWAY": primaryColor.toUpperCase(),
                        "CIRCADIAN CYCLE": circadianCycle.toUpperCase(),
                    });
                    $art.snapshot(); // last: signals Cloudflare the render is complete
                }

                console.log("LAYOUT:", LAYOUTS[GRID]);
                console.log("ARCHETYPE:", specialName.toUpperCase());
                console.log("COLORWAY:", primaryColor.toUpperCase());
                console.log("CIRCADIAN CYCLE:", circadianCycle.toUpperCase());


                if ($art.captureMode) {
                    // Snapshot capture: jump straight to the settled final frame.
                    render(TOTAL_FRAMES);
                    finish();
                    return;
                }

                // All windows at rest, gently swaying. `f` drives the sine phases,
                // `k` scales the sway amplitude (0 = static grid, 1 = full sway).
                function renderFloat(f, k) {
                    ctx.fillStyle = "#000";
                    ctx.fillRect(0, 0, W, H);

                    for (let gy = 0; gy < GRID; gy++) {
                        for (let gx = 0; gx < GRID; gx++) {
                            const i = gy * GRID + gx;
                            const fl = floats[i];
                            const x = gx * cellW;
                            const y = gy * cellH;
                            const offX = fl.ax * cellW * Math.sin(f * fl.sx + fl.px) * k;
                            const offY = fl.ay * cellH * Math.sin(f * fl.sy + fl.py) * k;
                            // swell scales around the cell center so breathing doesn't drift
                            const swell = 1 + fl.as * Math.sin(f * fl.ss + fl.ps) * k;
                            const w = cellW * swell;
                            const h = cellH * swell;
                            ctx.drawImage(
                                images[i],
                                x + offX + (cellW - w) / 2,
                                y + offY + (cellH - h) / 2,
                                w,
                                h
                            );
                        }
                    }
                }

                // Scale of cell i at boomerang frame rf (same math as render()).
                function scaleAtFrame(rf, i) {
                    const t = (rf - startFrame[i]) / POP_FRAMES;
                    if (t < 0) return 0;
                    return t >= 1 ? 1 : easeOutBack(t);
                }

                // Snap: every window pops from its captured scale to 1 at once.
                const SNAP_FRAMES = 24; // ~0.4s
                let snapScales = null;
                function renderSnap(t) {
                    ctx.fillStyle = "#000";
                    ctx.fillRect(0, 0, W, H);

                    const eased = t >= 1 ? 1 : easeOutBack(t);
                    for (let gy = 0; gy < GRID; gy++) {
                        for (let gx = 0; gx < GRID; gx++) {
                            const i = gy * GRID + gx;
                            const scale = snapScales[i] + (1 - snapScales[i]) * eased;
                            if (scale <= 0) continue;
                            const x = gx * cellW;
                            const y = gy * cellH;
                            const cx = x + cellW / 2;
                            const cy = y + cellH / 2;
                            ctx.drawImage(
                                images[i],
                                cx - (cellW * scale) / 2,
                                cy - (cellH * scale) / 2,
                                cellW * scale,
                                cellH * scale
                            );
                        }
                    }
                }

                // State machine. Click cycle once settled:
                //   settled -> boomerang (out/pause/in/hold forever)
                //   boomerang -> snap (everything pops to full immediately) -> alive
                //   alive -> calm (sway eases out) -> settled
                // Long press on a window (from settled or alive) zooms the camera
                // in on it until it fills the canvas; click zooms back out.
                let state = "reveal"; // reveal | settled | out | pause | in | hold | snap | alive | calm | zoomin | zoomed | zoomout
                let frame = 0;
                let floatFrame = 0;
                let calmStartK = 1;
                const PAUSE_FRAMES = 30; // ~500ms hold at empty and at full grid
                const RAMP_FRAMES = 60; // sway ease-in / ease-out ~1s

                // ---- long-press camera zoom ----
                const ZOOM_FRAMES = 72; // ~1.2s in/out
                let baseState = "settled"; // what the camera is looking at (settled | alive)

                function easeInOutCubic(t) {
                    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
                }

                // Draw whatever the world looks like underneath the camera.
                function renderBase() {
                    if (baseState === "alive") {
                        renderFloat(floatFrame, Math.min(floatFrame / RAMP_FRAMES, 1));
                        floatFrame++;
                    } else {
                        render(TOTAL_FRAMES);
                    }
                }

                // Camera = center point + view width in canvas coords (view height
                // follows from the 4:5 aspect). The zoomed window renders at
                // ZOOM_LEVEL of the canvas size regardless of grid size, and
                // while zoomed the camera can pan to explore the grid.
                const ZOOM_LEVEL = 0.6;
                const GRID_VIEW = { x: W / 2, y: H / 2, vw: W }; // camera showing the full grid
                let cam = { ...GRID_VIEW }; // current camera
                let zoomTarget = null; // camera aimed at the pressed cell
                let zoomFrom = null; // camera snapshot when a zoom leg starts

                // Pan inertia: the camera carries momentum after a flick and decays
                // with friction, so the grid feels like it has a little mass.
                let vel = { x: 0, y: 0 }; // canvas units / frame
                const FRICTION = 0.9; // velocity retained each frame while gliding
                const MIN_VEL = 0.2; // below this the glide stops

                function renderView(c) {
                    const s = W / c.vw;
                    ctx.setTransform(s, 0, 0, s, W / 2 - c.x * s, H / 2 - c.y * s);
                    renderBase();
                    ctx.setTransform(1, 0, 0, 1, 0, 0);
                }

                // Ease the camera between two views; keeps `cam` current so a
                // pan or reverse zoom can take over from wherever it is.
                function renderZoomLeg(from, to, u) {
                    const e = easeInOutCubic(u);
                    cam = {
                        x: from.x + (to.x - from.x) * e,
                        y: from.y + (to.y - from.y) * e,
                        vw: from.vw + (to.vw - from.vw) * e,
                    };
                    renderView(cam);
                }

                // Keep the view inside the canvas while panning.
                function clampAxis(v, half, max) {
                    if (half * 2 >= max) return max / 2;
                    return Math.min(Math.max(v, half), max - half);
                }
                function clampCam() {
                    const vh = cam.vw * (H / W);
                    cam.x = clampAxis(cam.x, cam.vw / 2, W);
                    cam.y = clampAxis(cam.y, vh / 2, H);
                }

                function tick() {
                    if (state === "reveal") {
                        render(frame);
                        if (frame >= TOTAL_FRAMES) {
                            state = "settled";
                            finish();
                            running = false; // stop the loop; a click restarts it
                            return; // idle until clicked
                        }
                        frame++;
                    } else if (state === "out") {
                        render(TOTAL_FRAMES - frame);
                        if (frame >= TOTAL_FRAMES) {
                            state = "pause";
                            frame = 0;
                        } else {
                            frame++;
                        }
                    } else if (state === "pause") {
                        render(-1); // hold a fully empty canvas before popping back in
                        if (frame >= PAUSE_FRAMES) {
                            state = "in";
                            frame = 0;
                        } else {
                            frame++;
                        }
                    } else if (state === "in") {
                        render(frame);
                        if (frame >= TOTAL_FRAMES) {
                            state = "hold";
                            frame = 0;
                        } else {
                            frame++;
                        }
                    } else if (state === "hold") {
                        // hold the full grid before reversing out again
                        render(TOTAL_FRAMES);
                        if (frame >= PAUSE_FRAMES) {
                            state = "out";
                            frame = 0;
                        } else {
                            frame++;
                        }
                    } else if (state === "snap") {
                        renderSnap(frame / SNAP_FRAMES);
                        if (frame >= SNAP_FRAMES) {
                            state = "alive";
                            floatFrame = 0;
                        } else {
                            frame++;
                        }
                    } else if (state === "alive") {
                        const k = Math.min(floatFrame / RAMP_FRAMES, 1); // sway eases in
                        renderFloat(floatFrame, k);
                        floatFrame++;
                    } else if (state === "calm") {
                        // sway eases out, windows drift back to rest, then go static
                        const k = calmStartK * Math.max(1 - frame / RAMP_FRAMES, 0);
                        renderFloat(floatFrame, k);
                        floatFrame++;
                        if (frame >= RAMP_FRAMES) {
                            render(TOTAL_FRAMES);
                            state = "settled";
                            running = false;
                            return; // idle until clicked
                        }
                        frame++;
                    } else if (state === "zoomin") {
                        renderZoomLeg(zoomFrom, zoomTarget, frame / ZOOM_FRAMES);
                        if (frame >= ZOOM_FRAMES) {
                            state = "zoomed";
                        } else {
                            frame++;
                        }
                    } else if (state === "zoomed") {
                        // While not actively dragging, glide on leftover momentum.
                        if (!drag && (Math.abs(vel.x) > MIN_VEL || Math.abs(vel.y) > MIN_VEL)) {
                            const wantX = cam.x + vel.x;
                            const wantY = cam.y + vel.y;
                            cam.x = wantX;
                            cam.y = wantY;
                            clampCam();
                            if (cam.x !== wantX) vel.x = 0; // hit an edge: kill that axis
                            if (cam.y !== wantY) vel.y = 0;
                            vel.x *= FRICTION;
                            vel.y *= FRICTION;
                        } else if (!drag) {
                            vel.x = 0;
                            vel.y = 0;
                        }
                        renderView(cam); // pan moves cam; sway continues if alive
                    } else if (state === "zoomout") {
                        renderZoomLeg(zoomFrom, GRID_VIEW, frame / ZOOM_FRAMES);
                        if (frame >= ZOOM_FRAMES) {
                            state = baseState;
                            if (state === "settled") {
                                render(TOTAL_FRAMES);
                                running = false;
                                return; // idle until clicked
                            }
                        } else {
                            frame++;
                        }
                    }
                }

                // ---- frame-rate cap (same technique as p5.js frameRate) ----
                // requestAnimationFrame fires at the monitor's native rate — 60Hz, or
                // 120Hz on a ProMotion display in Brave/Chrome. We let it fire freely
                // but only advance the animation once per targetInterval, so playback
                // is locked to FPS regardless of refresh rate. FRAME_EPSILON mirrors
                // p5's leniency: a frame that lands a hair early still counts, which
                // keeps the cadence even when capping 60 on a 120Hz panel.
                const targetInterval = 1000 / FPS;
                const FRAME_EPSILON = 5;
                let running = false;
                let lastTargetFrameTime = 0;

                function loop(now) {
                    if (!running) return; // a tick asked to idle: stop scheduling
                    requestAnimationFrame(loop);
                    if (now - lastTargetFrameTime >= targetInterval - FRAME_EPSILON) {
                        // Advance the target clock; Math.max prevents a backlog of
                        // catch-up frames if rAF stalled (e.g. backgrounded tab).
                        lastTargetFrameTime = Math.max(lastTargetFrameTime + targetInterval, now);
                        tick();
                    }
                }
                function startLoop() {
                    if (running) return; // never stack two loops
                    running = true;
                    lastTargetFrameTime = 0; // draw the first frame immediately
                    requestAnimationFrame(loop);
                }
                startLoop();

                // ---- long-press detection (pointer events: mouse + touch) ----
                const LONG_PRESS_MS = 500;
                const MOVE_TOLERANCE = 10; // css px of drift before the press cancels
                let pressTimer = null;
                let longPressFired = false;
                let pressPos = null;

                // Map a pointer event to the cell under it (null in gutters/margins).
                function cellAt(clientX, clientY) {
                    const rect = canvas.getBoundingClientRect();
                    const px = (clientX - rect.left) * (W / rect.width);
                    const py = (clientY - rect.top) * (H / rect.height);
                    const gx = Math.floor(px / cellW);
                    const gy = Math.floor(py / cellH);
                    if (gx < 0 || gx >= GRID || gy < 0 || gy >= GRID) return null;
                    // Zero gutter: every in-bounds pixel belongs to a cell.
                    return { x: gx * cellW, y: gy * cellH };
                }

                function cancelPress() {
                    clearTimeout(pressTimer);
                    pressPos = null;
                }

                // Drag-to-pan while zoomed.
                let drag = null; // { x, y, camX, camY, moved }
                let suppressClick = false; // a real drag shouldn't exit the zoom
                let lastMoveT = 0; // timestamp of the last pan move, for release momentum
                let lastPointerType = "mouse"; // gates the context menu: mouse vs touch

                function endDrag() {
                    if (drag) {
                        if (drag.moved) suppressClick = true;
                        // If the finger was held still before lifting, don't fling.
                        if (performance.now() - lastMoveT > 80) {
                            vel.x = 0;
                            vel.y = 0;
                        }
                    }
                    drag = null;
                }

                canvas.addEventListener("pointerdown", (e) => {
                    // A long press on touch often fires no synthetic click on release,
                    // leaving longPressFired stuck true so the next tap gets eaten.
                    // Clear it on the next interaction so one tap exits the zoom.
                    longPressFired = false;
                    lastPointerType = e.pointerType || "mouse";
                    // Only the primary (left) button drives zoom/pan; let right- and
                    // middle-clicks through so the native menu (Save Image As) works
                    // without triggering a long-press zoom. (Touch reports button 0.)
                    if (e.button !== 0) return;
                    if (state === "zoomed") {
                        vel.x = 0; // catch the camera mid-glide
                        vel.y = 0;
                        drag = { x: e.clientX, y: e.clientY, camX: cam.x, camY: cam.y, moved: false };
                        lastMoveT = performance.now();
                        canvas.setPointerCapture(e.pointerId);
                        return;
                    }
                    if (state !== "settled" && state !== "alive") return;
                    const cell = cellAt(e.clientX, e.clientY);
                    if (!cell) return;
                    pressPos = { x: e.clientX, y: e.clientY };
                    clearTimeout(pressTimer);
                    pressTimer = setTimeout(() => {
                        longPressFired = true;
                        baseState = state;
                        zoomFrom = { ...GRID_VIEW };
                        // Aim at the pressed cell, but clamp to the same bounds
                        // panning uses, so edge/corner windows zoom in off-center
                        // (within the canvas) instead of overshooting the edge and
                        // snapping into place on the first drag.
                        const tvw = cellW / ZOOM_LEVEL;
                        const tvh = tvw * (H / W);
                        zoomTarget = {
                            x: clampAxis(cell.x + cellW / 2, tvw / 2, W),
                            y: clampAxis(cell.y + cellH / 2, tvh / 2, H),
                            vw: tvw,
                        };
                        state = "zoomin";
                        frame = 0;
                        vel.x = 0; // start the zoom with no leftover momentum
                        vel.y = 0;
                        // settled idles with the loop stopped; alive already has it running
                        startLoop(); // no-op if already running
                    }, LONG_PRESS_MS);
                });
                canvas.addEventListener("pointermove", (e) => {
                    if (drag) {
                        const rect = canvas.getBoundingClientRect();
                        const worldPerPx = cam.vw / rect.width;
                        const dx = e.clientX - drag.x;
                        const dy = e.clientY - drag.y;
                        if (Math.hypot(dx, dy) > MOVE_TOLERANCE) drag.moved = true;
                        const prevX = cam.x;
                        const prevY = cam.y;
                        cam.x = drag.camX - dx * worldPerPx;
                        cam.y = drag.camY - dy * worldPerPx;
                        clampCam();
                        // Track velocity for release momentum: weight the latest move
                        // heavily, but smooth a little so jitter doesn't fling.
                        vel.x = (cam.x - prevX) * 0.6 + vel.x * 0.4;
                        vel.y = (cam.y - prevY) * 0.6 + vel.y * 0.4;
                        lastMoveT = performance.now();
                        return;
                    }
                    if (!pressPos) return;
                    if (Math.hypot(e.clientX - pressPos.x, e.clientY - pressPos.y) > MOVE_TOLERANCE) {
                        cancelPress();
                    }
                });
                canvas.addEventListener("pointerup", () => {
                    cancelPress();
                    endDrag();
                });
                canvas.addEventListener("pointercancel", () => {
                    cancelPress();
                    endDrag();
                });
                canvas.addEventListener("pointerleave", cancelPress);
                // Desktop: allow the native right-click menu so "Save Image As" works
                // on the canvas. Touch: keep suppressing it so a long press doesn't
                // pop the browser's default menu/selection.
                canvas.addEventListener("contextmenu", (e) => {
                    if (lastPointerType === "touch") e.preventDefault();
                });
                canvas.style.touchAction = "none";

                // Scroll/trackpad pans the zoomed view too.
                canvas.addEventListener(
                    "wheel",
                    (e) => {
                        if (state !== "zoomed") return;
                        e.preventDefault();
                        const rect = canvas.getBoundingClientRect();
                        const worldPerPx = cam.vw / rect.width;
                        cam.x += e.deltaX * worldPerPx;
                        cam.y += e.deltaY * worldPerPx;
                        clampCam();
                    },
                    { passive: false }
                );

                canvas.addEventListener("click", () => {
                    if (suppressClick) {
                        // release at the end of a pan; don't exit the zoom
                        suppressClick = false;
                        return;
                    }
                    if (longPressFired) {
                        // the release after a long press also fires click; eat it
                        longPressFired = false;
                        return;
                    }
                    if (state === "zoomed" || state === "zoomin") {
                        // zoom back out from wherever the camera is
                        zoomFrom = { ...cam };
                        state = "zoomout";
                        frame = 0;
                        return;
                    }
                    if (state === "settled") {
                        state = "out";
                        frame = 0;
                        startLoop();
                    } else if (state === "out" || state === "pause" || state === "in" || state === "hold") {
                        // boomerang -> capture where every window is right now and pop
                        // it all back to full view immediately
                        const rf =
                            state === "out" ? TOTAL_FRAMES - frame :
                                state === "pause" ? -1 :
                                    state === "in" ? frame :
                                        TOTAL_FRAMES; // hold
                        snapScales = picks.map((_, i) => scaleAtFrame(rf, i));
                        state = "snap";
                        frame = 0;
                    } else if (state === "alive") {
                        calmStartK = Math.min(floatFrame / RAMP_FRAMES, 1);
                        state = "calm";
                        frame = 0;
                    }
                    // reveal/calm: ignore clicks while transitioning
                });
            });
        });
    </script>
</body>

</html>
