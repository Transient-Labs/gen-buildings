<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Buildings Prints</title>
    <style>
        html,
        body {
            margin: 0;
            height: 100%;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        canvas {
            display: block;
            max-width: 100vw;
            max-height: 100vh;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>

<body>
    <script>
        const WINDOW_COUNT = 1000;

        // ---- print-ready grid presets ----
        // Each preset targets an EXACT final physical print size (5:4). Windows
        // keep their 4:5 aspect (cellH = 1.25 * cellW) and butt edge-to-edge with
        // no gaps; only an outer border separates the grid from the paper edge.
        // The window size flexes slightly per preset so the largest possible grid
        // fits inside the target while every side keeps at least MIN_BORDER_IN.
        const PRINT_DPI = 300;
        const MIN_BORDER_IN = 0.75; // minimum outer border per side, inches
        const WIN_ASPECT = 1.25;    // window height / width (4:5 portrait)
        const LABEL_HEIGHT_IN = 0.15; // bottom label LETTER height (real-world inches)

        // Each preset is a target final physical print size, in inches (5:4).
        const PRESETS = [
            { cols: 11, rows: 7, finalWIn: 10, finalHIn: 8 },
            { cols: 11, rows: 7, finalWIn: 20, finalHIn: 16 },
            { cols: 11, rows: 7, finalWIn: 30, finalHIn: 24 },
        ];

        // Derive the in-inch geometry for a preset: the largest cell (keeping 4:5)
        // that fits the available area after reserving MIN_BORDER_IN on all sides,
        // then the actual (>= min) borders that center the grid in the target.
        function presetGeom(p) {
            const availableWIn = p.finalWIn - 2 * MIN_BORDER_IN;
            const availableHIn = p.finalHIn - 2 * MIN_BORDER_IN;
            const cellWIn = Math.min(availableWIn / p.cols, (availableHIn / p.rows) / WIN_ASPECT);
            const cellHIn = cellWIn * WIN_ASPECT;
            const borderXIn = (p.finalWIn - p.cols * cellWIn) / 2;
            const borderYIn = (p.finalHIn - p.rows * cellHIn) / 2;
            return { cellWIn, cellHIn, borderXIn, borderYIn };
        }

        // Render + caption size via ?size=0|1|2 (10x8 | 20x16 | 30x24). Drives BOTH
        // the actual render AND the bottom caption text. Defaults to 0.
        const sizeParam = parseInt(new URLSearchParams(location.search).get("size"), 10);
        const sizeIdx = Number.isFinite(sizeParam) ? Math.min(Math.max(sizeParam, 0), PRESETS.length - 1) : 0;
        const PRESET = PRESETS[sizeIdx];

        // Bottom-margin print number, e.g. ?print=1 -> "#1" (defaults to 1).
        const printParam = new URLSearchParams(location.search).get("print");
        const printNum = printParam != null ? printParam : "1";

        // Bottom caption size label (height×width), derived from the rendered
        // size, e.g. size=0 -> 8"x10".
        const printSizeLabel = `${PRESET.finalHIn}"x${PRESET.finalWIn}"`;

        // Caption font: Courier New is a web-safe system font (no @font-face needed).
        const LABEL_FONT = '"Courier New", monospace';

        // Capture mode (?capture=1): for a headless backend grabbing the print
        // master. Forces full native resolution (ignores the live downscale), skips
        // the reveal animation, draws the settled frame, and signals readiness.
        const captureMode = new URLSearchParams(location.search).get("capture") === "1";

        const COLS = PRESET.cols;
        const ROWS = PRESET.rows;

        // Native print-resolution pixel dimensions (inches x DPI).
        const GEOM = presetGeom(PRESET);

        // Log the full sizing spec for the selected preset. Resolution math is
        // border-free: required asset resolution is driven only by the printed
        // window grid at PRINT_DPI; the border is solid black fill (no detail),
        // so it never factors into source-image resolution requirements.
        const r = (n) => Math.round(n * 1000) / 1000;
        const gridWIn = COLS * GEOM.cellWIn; // printed window-grid area, inches
        const gridHIn = ROWS * GEOM.cellHIn;
        console.log("Grid:", `${COLS}×${ROWS}`);
        console.log("Final:", `${PRESET.finalWIn}″ × ${PRESET.finalHIn}″`);
        console.log("Window:", `${r(GEOM.cellWIn)}″ × ${r(GEOM.cellHIn)}″`);
        console.log("Border:", `${r(GEOM.borderXIn)}″ × ${r(GEOM.borderYIn)}″`);
        console.log("Grid printed:", `${r(gridWIn)}″ × ${r(gridHIn)}″`);
        // Required source resolution each window image needs to print crisp at
        // PRINT_DPI (border-free: cell inches × DPI). ceil = true minimum.
        const minWindowPx = `${Math.ceil(GEOM.cellWIn * PRINT_DPI)}×${Math.ceil(GEOM.cellHIn * PRINT_DPI)}`;
        console.log("Min window px:", minWindowPx);
        // Printed window-grid resolution (border-free) and full export file size.
        console.log("Grid px:", `${Math.round(gridWIn * PRINT_DPI)}×${Math.round(gridHIn * PRINT_DPI)}`);
        console.log("Canvas px (full, incl. border):", `${Math.round(PRESET.finalWIn * PRINT_DPI)}×${Math.round(PRESET.finalHIn * PRINT_DPI)}`);

        const CELL_W = GEOM.cellWIn * PRINT_DPI;
        const CELL_H = GEOM.cellHIn * PRINT_DPI;
        const BORDER_X = GEOM.borderXIn * PRINT_DPI;
        const BORDER_Y = GEOM.borderYIn * PRINT_DPI;
        const PRINT_W = PRESET.finalWIn * PRINT_DPI; // full canvas, print px (exact target)
        const PRINT_H = PRESET.finalHIn * PRINT_DPI;

        const LIVE_MAX_H = 4000;

        // Live preview may downscale the whole canvas (grid + border) uniformly;
        // print/export keeps native resolution. Geometry stays float so the 5:4
        // ratio is exact; only the integer canvas pixel dims are rounded.
        const hasMouse = !!(window.matchMedia && window.matchMedia("(any-pointer: fine)").matches);
        // Full native resolution on desktop or in capture mode; cap height on
        // pure-touch devices for live-preview performance only.
        const liveScale = (hasMouse || captureMode) ? 1 : Math.min(1, LIVE_MAX_H / PRINT_H);
        const cellW = CELL_W * liveScale;
        const cellH = CELL_H * liveScale;
        const borderX = BORDER_X * liveScale;
        const borderY = BORDER_Y * liveScale;
        const W = COLS * cellW + 2 * borderX;
        const H = ROWS * cellH + 2 * borderY;


        const canvas = document.createElement("canvas");
        canvas.width = Math.round(W);
        canvas.height = Math.round(H);
        document.body.appendChild(canvas);
        const ctx = canvas.getContext("2d");

        // ---- full-resolution PNG export ----
        // The canvas backing store is the native print resolution (full size on a
        // mouse/desktop and in ?capture=1). exportPNG() returns those exact pixels as
        // a PNG Blob; savePNG() downloads it. Both are exposed on window so a headless
        // backend can `await window.exportPNG()` once #render-ready is set, and a
        // person can press "s" to download. (canvas.toBlob requires the window images
        // be same-origin / CORS-clean, else the canvas is tainted and export throws.)
        function exportPNG() {
            return new Promise((resolve) => canvas.toBlob(resolve, "image/png"));
        }
        function savePNG() {
            exportPNG().then((blob) => {
                if (!blob) return;
                const a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = `block0-size${sizeIdx}-print${printNum}-${canvas.width}x${canvas.height}.png`;
                a.click();
                URL.revokeObjectURL(a.href);
            });
        }
        window.exportPNG = exportPNG;
        window.savePNG = savePNG;
        window.addEventListener("keydown", (e) => {
            if (e.key === "s" || e.key === "S") savePNG();
        });

        // Local image loader: load the given path directly and fully decode it
        // (kept as an ImageBitmap so the first zoom-in doesn't stall re-rasterizing).
        function loadImage(src) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = () => reject(new Error("failed to load " + src));
                img.src = src;
            }).then((img) =>
                img
                    .decode()
                    .then(() => (window.createImageBitmap ? createImageBitmap(img) : img))
                    .catch(() => img)
            );
        }

        const FPS = 60;
        const TOTAL_FRAMES = 2 * FPS;
        const POP_FRAMES = 36;

        function easeOutBack(t) {
            const c1 = 1.70158;
            const c3 = c1 + 1;
            return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
        }

        const cells = COLS * ROWS;

        // ---- seeded PRNG for window selection ----
        // Pass ?seed=<any string> to make the window selection reproducible: the
        // same seed always picks the same windows. With no seed, a random one is
        // generated so each load differs. cyrb128 hashes the string into 4
        // 32-bit values; mulberry32 turns one into a [0,1) stream.
        function cyrb128(str) {
            let h1 = 1779033703, h2 = 3144134277, h3 = 1013904242, h4 = 2773480762;
            for (let i = 0; i < str.length; i++) {
                const k = str.charCodeAt(i);
                h1 = h2 ^ Math.imul(h1 ^ k, 597399067);
                h2 = h3 ^ Math.imul(h2 ^ k, 2869860233);
                h3 = h4 ^ Math.imul(h3 ^ k, 951274213);
                h4 = h1 ^ Math.imul(h4 ^ k, 2716044179);
            }
            h1 = Math.imul(h3 ^ (h1 >>> 18), 597399067);
            h2 = Math.imul(h4 ^ (h2 >>> 22), 2869860233);
            h3 = Math.imul(h1 ^ (h3 >>> 17), 951274213);
            h4 = Math.imul(h2 ^ (h4 >>> 19), 2716044179);
            return (h1 ^ h2 ^ h3 ^ h4) >>> 0;
        }
        function mulberry32(a) {
            return function () {
                a |= 0; a = (a + 0x6D2B79F5) | 0;
                let t = Math.imul(a ^ (a >>> 15), 1 | a);
                t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
                return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
            };
        }

        const seedParam = new URLSearchParams(location.search).get("seed");
        const seed = seedParam != null ? seedParam : String(Math.floor(Math.random() * 1e9));
        const rng = mulberry32(cyrb128(seed));

        // Randomly select `cells` unique window ids (no repeats) from 1..WINDOW_COUNT.
        const picks = [];
        const seen = new Set();
        while (picks.length < cells) {
            const n = 1 + Math.floor(rng() * WINDOW_COUNT);
            if (seen.has(n)) continue;
            seen.add(n);
            picks.push(n);
        }

        function det(i, k) {
            const x = Math.sin((i + 1) * 127.1 + (k + 1) * 311.7) * 43758.5453;
            return x - Math.floor(x);
        }

        const revealOrder = picks.map((_, i) => i).sort((a, b) => det(a, 99) - det(b, 99));

            Promise.all(picks.map((n) => loadImage(`https://cdn.transientlabs.xyz/tlx/windows/building-prints/final_windows_prints/window-${n}.webp`))).then((images) => {
                const count = COLS * ROWS;

                const span = TOTAL_FRAMES - POP_FRAMES;
                const startFrame = new Array(count);
                revealOrder.forEach((cell, order) => {
                    startFrame[cell] = count > 1 ? Math.round((order / (count - 1)) * span) : 0;
                });

                // Paint the backdrop: white outer border, black behind the window
                // grid (so popping/empty cells read against black, border stays white).
                function paintBg() {
                    ctx.fillStyle = "#fff";
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = "#000";
                    ctx.fillRect(borderX, borderY, COLS * cellW, ROWS * cellH);
                    drawLabels();
                }

                // Bottom-left label: comma-separated "Block 0, <size>, #<print>",
                // left-aligned to the grid's left edge and vertically centered in
                // the bottom border. Courier New (web-safe monospace).
                function drawLabels() {
                    const gridBottom = borderY + ROWS * cellH;
                    const cy = (gridBottom + H) / 2; // vertical center of bottom margin
                    const text = `Block 0, ${printSizeLabel}, #${printNum}`;
                    // Target the LETTER height (~0.25" real-world, any rendered
                    // sizeIdx). The font em != glyph height, so measure a cap-height
                    // sample ("0") and rescale the em so drawn letters hit the target.
                    const targetPx = LABEL_HEIGHT_IN * PRINT_DPI * liveScale;
                    ctx.font = `${targetPx}px ${LABEL_FONT}`;
                    const m = ctx.measureText("0");
                    const capH = m.actualBoundingBoxAscent + m.actualBoundingBoxDescent;
                    const fontPx = capH > 0 ? targetPx * (targetPx / capH) : targetPx;
                    ctx.fillStyle = "#000";
                    ctx.font = `${fontPx}px ${LABEL_FONT}`;
                    ctx.textBaseline = "middle";
                    ctx.textAlign = "left";
                    ctx.fillText(text, borderX, cy);
                }

                function render(frame) {
                    paintBg();

                    for (let gy = 0; gy < ROWS; gy++) {
                        for (let gx = 0; gx < COLS; gx++) {
                            const i = gy * COLS + gx;
                            const t = (frame - startFrame[i]) / POP_FRAMES;
                            if (t < 0) continue;

                            const scale = t >= 1 ? 1 : easeOutBack(t);
                            if (scale <= 0) continue;

                            const x = borderX + gx * cellW;
                            const y = borderY + gy * cellH;
                            const cx = x + cellW / 2;
                            const cy = y + cellH / 2;
                            ctx.drawImage(
                                images[i],
                                cx - (cellW * scale) / 2,
                                cy - (cellH * scale) / 2,
                                cellW * scale,
                                cellH * scale
                            );
                        }
                    }
                }

                let state = "reveal";
                let frame = 0;

                function tick() {
                    // Load-in reveal only: pop each window in on its staggered
                    // schedule, then settle and stop. No click/zoom interactions.
                    render(frame);
                    if (frame >= TOTAL_FRAMES) {
                        state = "settled";
                        running = false; // idle on the finished grid
                        return;
                    }
                    frame++;
                }

                const targetInterval = 1000 / FPS;
                const FRAME_EPSILON = 5;
                let running = false;
                let lastTargetFrameTime = 0;

                function loop(now) {
                    if (!running) return;
                    requestAnimationFrame(loop);
                    if (now - lastTargetFrameTime >= targetInterval - FRAME_EPSILON) {
                        lastTargetFrameTime = Math.max(lastTargetFrameTime + targetInterval, now);
                        tick();
                    }
                }
                function startLoop() {
                    if (running) return;
                    running = true;
                    lastTargetFrameTime = 0;
                    requestAnimationFrame(loop);
                }
                if (captureMode) {
                    // Headless capture: skip the reveal, draw the settled final
                    // frame at full resolution, and flag readiness so the backend
                    // can wait on it, then `await window.exportPNG()`.
                    state = "settled";
                    render(TOTAL_FRAMES);
                    window.__renderReady = true;
                    document.body.setAttribute("data-render-ready", "1");
                } else {
                    startLoop();
                }

            });
    </script>
</body>

</html>
