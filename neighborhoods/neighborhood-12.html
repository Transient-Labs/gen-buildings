<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Neighborhood</title>
    <style>
        html,
        body {
            margin: 0;
            height: 100%;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        canvas {
            display: block;
            max-width: 100vw;
            max-height: 100vh;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>

<body>
    <script>
        const WINDOW_COUNT = 1000;

        const COLS = 20;
        const ROWS = 16;
        const CELL_W = 200;
        const CELL_H = 250;
        const LIVE_MAX_H = 4000;

        const hasMouse = !!(window.matchMedia && window.matchMedia("(any-pointer: fine)").matches);
        const liveScale = hasMouse ? 1 : Math.min(1, LIVE_MAX_H / (ROWS * CELL_H));
        const cellW = Math.round(CELL_W * liveScale);
        const cellH = Math.round(CELL_H * liveScale);
        const W = COLS * cellW;
        const H = ROWS * cellH;


        const canvas = document.createElement("canvas");
        canvas.width = W;
        canvas.height = H;
        document.body.appendChild(canvas);
        const ctx = canvas.getContext("2d");

        const IPFS_GATEWAYS = [
            "https://ipfs.io",
            "https://dweb.link",
            "https://ipfs.filebase.io",
            "https://ipfs.transientusercontent.xyz",
        ];

        function loadFrom(src) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = () => reject(new Error("failed to load " + src));
                img.src = src;
            }).then((img) =>
                img
                    .decode()
                    .then(() => (window.createImageBitmap ? createImageBitmap(img) : img))
                    .catch(() => img)
            );
        }

        function loadImage(src) {
            const path = src.slice(src.indexOf("/ipfs/"));
            let attempt = 0;
            const tryNext = () =>
                loadFrom(IPFS_GATEWAYS[attempt] + path).catch((err) => {
                    if (++attempt < IPFS_GATEWAYS.length) return tryNext();
                    throw err;
                });
            return tryNext();
        }

        const FPS = 60;
        const TOTAL_FRAMES = 2 * FPS;
        const POP_FRAMES = 36;

        function easeOutBack(t) {
            const c1 = 1.70158;
            const c3 = c1 + 1;
            return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
        }

        const picks = [639, 733, 601, 266, 932, 852, 319, 325, 238, 417, 490, 462, 972, 973, 337, 937, 141, 608, 620, 563, 427, 987, 712, 741, 182, 192, 884, 923, 655, 746, 816, 402, 109, 24, 174, 371, 679, 307, 144, 562, 276, 394, 69, 994, 761, 107, 156, 451, 418, 723, 882, 25, 398, 704, 573, 492, 15, 822, 819, 150, 140, 195, 840, 104, 855, 767, 220, 993, 687, 713, 453, 773, 341, 431, 281, 470, 511, 414, 745, 499, 868, 435, 903, 837, 151, 215, 796, 791, 821, 636, 590, 449, 17, 419, 545, 90, 681, 155, 543, 632, 622, 97, 611, 966, 102, 839, 291, 345, 792, 376, 578, 448, 591, 717, 327, 615, 153, 424, 730, 950, 258, 436, 528, 503, 700, 721, 751, 740, 720, 346, 936, 199, 74, 669, 461, 567, 544, 444, 998, 62, 64, 920, 123, 423, 847, 794, 277, 23, 928, 160, 469, 668, 964, 428, 559, 323, 894, 27, 845, 800, 11, 343, 383, 284, 58, 71, 980, 364, 976, 938, 348, 161, 726, 658, 677, 642, 218, 648, 661, 515, 162, 985, 757, 366, 224, 65, 185, 587, 507, 609, 561, 922, 253, 957, 869, 617, 256, 962, 789, 550, 619, 750, 99, 84, 610, 149, 203, 919, 372, 79, 896, 889, 742, 575, 260, 552, 875, 194, 452, 643, 390, 830, 110, 184, 349, 124, 589, 571, 489, 321, 14, 690, 362, 430, 87, 450, 769, 803, 2, 318, 787, 663, 534, 904, 310, 871, 384, 901, 142, 872, 43, 487, 282, 393, 743, 385, 921, 134, 702, 252, 675, 234, 727, 275, 75, 967, 246, 766, 970, 301, 815, 614, 42, 739, 8, 4, 691, 388, 313, 770, 686, 370, 656, 779, 283, 931, 122, 788, 902, 342, 850, 629, 782, 886, 521, 56, 127, 73, 532, 778, 208, 447, 422, 719, 517, 133, 5, 645, 446, 137, 917, 126, 640, 235, 164, 26, 197, 202, 495, 579];
        const cells = COLS * ROWS;

        function det(i, k) {
            const x = Math.sin((i + 1) * 127.1 + (k + 1) * 311.7) * 43758.5453;
            return x - Math.floor(x);
        }

        const revealOrder = picks.map((_, i) => i).sort((a, b) => det(a, 99) - det(b, 99));

        const floats = picks.map((_, i) => ({
            ax: 0.01 + 0.012 * det(i, 0),
            ay: 0.014 + 0.016 * det(i, 1),
            sx: 0.008 + 0.012 * det(i, 2),
            sy: 0.008 + 0.012 * det(i, 3),
            px: 2 * Math.PI * det(i, 4),
            py: 2 * Math.PI * det(i, 5),
            as: 0.02 + 0.03 * det(i, 6),
            ss: 0.006 + 0.01 * det(i, 7),
            ps: 2 * Math.PI * det(i, 8),
        }));

            Promise.all(picks.map((n) => loadImage(`https://ipfs.io/ipfs/Qmb195Z9XLptpKy3oyUxeLupCQE9eDUrXkiz8xQuSK1GwV/window-${n}.webp`))).then((images) => {
                const count = COLS * ROWS;

                const span = TOTAL_FRAMES - POP_FRAMES;
                const startFrame = new Array(count);
                revealOrder.forEach((cell, order) => {
                    startFrame[cell] = count > 1 ? Math.round((order / (count - 1)) * span) : 0;
                });

                function render(frame) {
                    ctx.fillStyle = "#000";
                    ctx.fillRect(0, 0, W, H);

                    for (let gy = 0; gy < ROWS; gy++) {
                        for (let gx = 0; gx < COLS; gx++) {
                            const i = gy * COLS + gx;
                            const t = (frame - startFrame[i]) / POP_FRAMES;
                            if (t < 0) continue;

                            const scale = t >= 1 ? 1 : easeOutBack(t);
                            if (scale <= 0) continue;

                            const x = gx * cellW;
                            const y = gy * cellH;
                            const cx = x + cellW / 2;
                            const cy = y + cellH / 2;
                            ctx.drawImage(
                                images[i],
                                cx - (cellW * scale) / 2,
                                cy - (cellH * scale) / 2,
                                cellW * scale,
                                cellH * scale
                            );
                        }
                    }
                }

                function renderFloat(f, k) {
                    ctx.fillStyle = "#000";
                    ctx.fillRect(0, 0, W, H);

                    for (let gy = 0; gy < ROWS; gy++) {
                        for (let gx = 0; gx < COLS; gx++) {
                            const i = gy * COLS + gx;
                            const fl = floats[i];
                            const x = gx * cellW;
                            const y = gy * cellH;
                            const offX = fl.ax * cellW * Math.sin(f * fl.sx + fl.px) * k;
                            const offY = fl.ay * cellH * Math.sin(f * fl.sy + fl.py) * k;
                            const swell = 1 + fl.as * Math.sin(f * fl.ss + fl.ps) * k;
                            const w = cellW * swell;
                            const h = cellH * swell;
                            ctx.drawImage(
                                images[i],
                                x + offX + (cellW - w) / 2,
                                y + offY + (cellH - h) / 2,
                                w,
                                h
                            );
                        }
                    }
                }

                function scaleAtFrame(rf, i) {
                    const t = (rf - startFrame[i]) / POP_FRAMES;
                    if (t < 0) return 0;
                    return t >= 1 ? 1 : easeOutBack(t);
                }

                const SNAP_FRAMES = 24;
                let snapScales = null;
                function renderSnap(t) {
                    ctx.fillStyle = "#000";
                    ctx.fillRect(0, 0, W, H);

                    const eased = t >= 1 ? 1 : easeOutBack(t);
                    for (let gy = 0; gy < ROWS; gy++) {
                        for (let gx = 0; gx < COLS; gx++) {
                            const i = gy * COLS + gx;
                            const scale = snapScales[i] + (1 - snapScales[i]) * eased;
                            if (scale <= 0) continue;
                            const x = gx * cellW;
                            const y = gy * cellH;
                            const cx = x + cellW / 2;
                            const cy = y + cellH / 2;
                            ctx.drawImage(
                                images[i],
                                cx - (cellW * scale) / 2,
                                cy - (cellH * scale) / 2,
                                cellW * scale,
                                cellH * scale
                            );
                        }
                    }
                }

                let state = "reveal";
                let frame = 0;
                let floatFrame = 0;
                let calmStartK = 1;
                const PAUSE_FRAMES = 30;
                const RAMP_FRAMES = 60;

                const ZOOM_FRAMES = 72;
                let baseState = "settled";

                function easeInOutCubic(t) {
                    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
                }

                function renderBase() {
                    if (baseState === "alive") {
                        renderFloat(floatFrame, Math.min(floatFrame / RAMP_FRAMES, 1));
                        floatFrame++;
                    } else {
                        render(TOTAL_FRAMES);
                    }
                }

                const ZOOM_LEVEL = 0.5;
                const GRID_VIEW = { x: W / 2, y: H / 2, vw: W };
                let cam = { ...GRID_VIEW };
                let zoomTarget = null;
                let zoomFrom = null;

                let vel = { x: 0, y: 0 };
                const FRICTION = 0.9;
                const MIN_VEL = 0.2;

                function renderView(c) {
                    const s = W / c.vw;
                    ctx.setTransform(s, 0, 0, s, W / 2 - c.x * s, H / 2 - c.y * s);
                    renderBase();
                    ctx.setTransform(1, 0, 0, 1, 0, 0);
                }

                function renderZoomLeg(from, to, u) {
                    const e = easeInOutCubic(u);
                    cam = {
                        x: from.x + (to.x - from.x) * e,
                        y: from.y + (to.y - from.y) * e,
                        vw: from.vw + (to.vw - from.vw) * e,
                    };
                    renderView(cam);
                }

                function clampAxis(v, half, max) {
                    if (half * 2 >= max) return max / 2;
                    return Math.min(Math.max(v, half), max - half);
                }
                function clampCam() {
                    const vh = cam.vw * (H / W);
                    cam.x = clampAxis(cam.x, cam.vw / 2, W);
                    cam.y = clampAxis(cam.y, vh / 2, H);
                }

                function tick() {
                    if (state === "reveal") {
                        render(frame);
                        if (frame >= TOTAL_FRAMES) {
                            state = "settled";
                            running = false;
                            return;
                        }
                        frame++;
                    } else if (state === "out") {
                        render(TOTAL_FRAMES - frame);
                        if (frame >= TOTAL_FRAMES) {
                            state = "pause";
                            frame = 0;
                        } else {
                            frame++;
                        }
                    } else if (state === "pause") {
                        render(-1);
                        if (frame >= PAUSE_FRAMES) {
                            state = "in";
                            frame = 0;
                        } else {
                            frame++;
                        }
                    } else if (state === "in") {
                        render(frame);
                        if (frame >= TOTAL_FRAMES) {
                            state = "hold";
                            frame = 0;
                        } else {
                            frame++;
                        }
                    } else if (state === "hold") {
                        render(TOTAL_FRAMES);
                        if (frame >= PAUSE_FRAMES) {
                            state = "out";
                            frame = 0;
                        } else {
                            frame++;
                        }
                    } else if (state === "snap") {
                        renderSnap(frame / SNAP_FRAMES);
                        if (frame >= SNAP_FRAMES) {
                            state = "alive";
                            floatFrame = 0;
                        } else {
                            frame++;
                        }
                    } else if (state === "alive") {
                        const k = Math.min(floatFrame / RAMP_FRAMES, 1);
                        renderFloat(floatFrame, k);
                        floatFrame++;
                    } else if (state === "calm") {
                        const k = calmStartK * Math.max(1 - frame / RAMP_FRAMES, 0);
                        renderFloat(floatFrame, k);
                        floatFrame++;
                        if (frame >= RAMP_FRAMES) {
                            render(TOTAL_FRAMES);
                            state = "settled";
                            running = false;
                            return;
                        }
                        frame++;
                    } else if (state === "zoomin") {
                        renderZoomLeg(zoomFrom, zoomTarget, frame / ZOOM_FRAMES);
                        if (frame >= ZOOM_FRAMES) {
                            state = "zoomed";
                        } else {
                            frame++;
                        }
                    } else if (state === "zoomed") {
                        if (!drag && (Math.abs(vel.x) > MIN_VEL || Math.abs(vel.y) > MIN_VEL)) {
                            const wantX = cam.x + vel.x;
                            const wantY = cam.y + vel.y;
                            cam.x = wantX;
                            cam.y = wantY;
                            clampCam();
                            if (cam.x !== wantX) vel.x = 0;
                            if (cam.y !== wantY) vel.y = 0;
                            vel.x *= FRICTION;
                            vel.y *= FRICTION;
                        } else if (!drag) {
                            vel.x = 0;
                            vel.y = 0;
                        }
                        renderView(cam);
                    } else if (state === "zoomout") {
                        renderZoomLeg(zoomFrom, GRID_VIEW, frame / ZOOM_FRAMES);
                        if (frame >= ZOOM_FRAMES) {
                            state = baseState;
                            if (state === "settled") {
                                render(TOTAL_FRAMES);
                                running = false;
                                return;
                            }
                        } else {
                            frame++;
                        }
                    }
                }

                const targetInterval = 1000 / FPS;
                const FRAME_EPSILON = 5;
                let running = false;
                let lastTargetFrameTime = 0;

                function loop(now) {
                    if (!running) return;
                    requestAnimationFrame(loop);
                    if (now - lastTargetFrameTime >= targetInterval - FRAME_EPSILON) {
                        lastTargetFrameTime = Math.max(lastTargetFrameTime + targetInterval, now);
                        tick();
                    }
                }
                function startLoop() {
                    if (running) return;
                    running = true;
                    lastTargetFrameTime = 0;
                    requestAnimationFrame(loop);
                }
                startLoop();

                const LONG_PRESS_MS = 500;
                const MOVE_TOLERANCE = 10;
                let pressTimer = null;
                let longPressFired = false;
                let pressPos = null;

                function cellAt(clientX, clientY) {
                    const rect = canvas.getBoundingClientRect();
                    const px = (clientX - rect.left) * (W / rect.width);
                    const py = (clientY - rect.top) * (H / rect.height);
                    const gx = Math.floor(px / cellW);
                    const gy = Math.floor(py / cellH);
                    if (gx < 0 || gx >= COLS || gy < 0 || gy >= ROWS) return null;
                    return { x: gx * cellW, y: gy * cellH };
                }

                function cancelPress() {
                    clearTimeout(pressTimer);
                    pressPos = null;
                }

                let drag = null;
                let suppressClick = false;
                let lastMoveT = 0;
                let lastPointerType = "mouse";

                function endDrag() {
                    if (drag) {
                        if (drag.moved) suppressClick = true;
                        if (performance.now() - lastMoveT > 80) {
                            vel.x = 0;
                            vel.y = 0;
                        }
                    }
                    drag = null;
                }

                canvas.addEventListener("pointerdown", (e) => {
                    longPressFired = false;
                    lastPointerType = e.pointerType || "mouse";
                    if (e.button !== 0) return;
                    if (state === "zoomed") {
                        vel.x = 0;
                        vel.y = 0;
                        drag = { x: e.clientX, y: e.clientY, camX: cam.x, camY: cam.y, moved: false };
                        lastMoveT = performance.now();
                        canvas.setPointerCapture(e.pointerId);
                        return;
                    }
                    if (state !== "settled" && state !== "alive") return;
                    const cell = cellAt(e.clientX, e.clientY);
                    if (!cell) return;
                    pressPos = { x: e.clientX, y: e.clientY };
                    clearTimeout(pressTimer);
                    pressTimer = setTimeout(() => {
                        longPressFired = true;
                        baseState = state;
                        zoomFrom = { ...GRID_VIEW };
                        const tvw = cellW / ZOOM_LEVEL;
                        const tvh = tvw * (H / W);
                        zoomTarget = {
                            x: clampAxis(cell.x + cellW / 2, tvw / 2, W),
                            y: clampAxis(cell.y + cellH / 2, tvh / 2, H),
                            vw: tvw,
                        };
                        state = "zoomin";
                        frame = 0;
                        vel.x = 0;
                        vel.y = 0;
                        startLoop();
                    }, LONG_PRESS_MS);
                });
                canvas.addEventListener("pointermove", (e) => {
                    if (drag) {
                        const rect = canvas.getBoundingClientRect();
                        const worldPerPx = cam.vw / rect.width;
                        const dx = e.clientX - drag.x;
                        const dy = e.clientY - drag.y;
                        if (Math.hypot(dx, dy) > MOVE_TOLERANCE) drag.moved = true;
                        const prevX = cam.x;
                        const prevY = cam.y;
                        cam.x = drag.camX - dx * worldPerPx;
                        cam.y = drag.camY - dy * worldPerPx;
                        clampCam();
                        vel.x = (cam.x - prevX) * 0.6 + vel.x * 0.4;
                        vel.y = (cam.y - prevY) * 0.6 + vel.y * 0.4;
                        lastMoveT = performance.now();
                        return;
                    }
                    if (!pressPos) return;
                    if (Math.hypot(e.clientX - pressPos.x, e.clientY - pressPos.y) > MOVE_TOLERANCE) {
                        cancelPress();
                    }
                });
                canvas.addEventListener("pointerup", () => {
                    cancelPress();
                    endDrag();
                });
                canvas.addEventListener("pointercancel", () => {
                    cancelPress();
                    endDrag();
                });
                canvas.addEventListener("pointerleave", cancelPress);
                canvas.addEventListener("contextmenu", (e) => {
                    if (lastPointerType === "touch") e.preventDefault();
                });
                canvas.style.touchAction = "none";

                canvas.addEventListener(
                    "wheel",
                    (e) => {
                        if (state !== "zoomed") return;
                        e.preventDefault();
                        const rect = canvas.getBoundingClientRect();
                        const worldPerPx = cam.vw / rect.width;
                        cam.x += e.deltaX * worldPerPx;
                        cam.y += e.deltaY * worldPerPx;
                        clampCam();
                    },
                    { passive: false }
                );

                canvas.addEventListener("click", () => {
                    if (suppressClick) {
                        suppressClick = false;
                        return;
                    }
                    if (longPressFired) {
                        longPressFired = false;
                        return;
                    }
                    if (state === "zoomed" || state === "zoomin") {
                        zoomFrom = { ...cam };
                        state = "zoomout";
                        frame = 0;
                        return;
                    }
                    if (state === "settled") {
                        state = "out";
                        frame = 0;
                        startLoop();
                    } else if (state === "out" || state === "pause" || state === "in" || state === "hold") {
                        const rf =
                            state === "out" ? TOTAL_FRAMES - frame :
                                state === "pause" ? -1 :
                                    state === "in" ? frame :
                                        TOTAL_FRAMES;
                        snapScales = picks.map((_, i) => scaleAtFrame(rf, i));
                        state = "snap";
                        frame = 0;
                    } else if (state === "alive") {
                        calmStartK = Math.min(floatFrame / RAMP_FRAMES, 1);
                        state = "calm";
                        frame = 0;
                    }
                });
            });
    </script>
</body>

</html>
