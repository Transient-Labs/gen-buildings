<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Neighborhood</title>
    <style>
        html,
        body {
            margin: 0;
            height: 100%;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        canvas {
            display: block;
            max-width: 100vw;
            max-height: 100vh;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>

<body>
    <script>
        const WINDOW_COUNT = 1000;

        const COLS = 20;
        const ROWS = 16;
        const CELL_W = 200;
        const CELL_H = 250;
        const LIVE_MAX_H = 4000;

        const hasMouse = !!(window.matchMedia && window.matchMedia("(any-pointer: fine)").matches);
        const liveScale = hasMouse ? 1 : Math.min(1, LIVE_MAX_H / (ROWS * CELL_H));
        const cellW = Math.round(CELL_W * liveScale);
        const cellH = Math.round(CELL_H * liveScale);
        const W = COLS * cellW;
        const H = ROWS * cellH;


        const canvas = document.createElement("canvas");
        canvas.width = W;
        canvas.height = H;
        document.body.appendChild(canvas);
        const ctx = canvas.getContext("2d");

        const IPFS_GATEWAYS = [
            "https://ipfs.io",
            "https://dweb.link",
            "https://ipfs.filebase.io",
            "https://ipfs.transientusercontent.xyz",
        ];

        function loadFrom(src) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = () => reject(new Error("failed to load " + src));
                img.src = src;
            }).then((img) =>
                img
                    .decode()
                    .then(() => (window.createImageBitmap ? createImageBitmap(img) : img))
                    .catch(() => img)
            );
        }

        function loadImage(src) {
            const path = src.slice(src.indexOf("/ipfs/"));
            let attempt = 0;
            const tryNext = () =>
                loadFrom(IPFS_GATEWAYS[attempt] + path).catch((err) => {
                    if (++attempt < IPFS_GATEWAYS.length) return tryNext();
                    throw err;
                });
            return tryNext();
        }

        const FPS = 60;
        const TOTAL_FRAMES = 2 * FPS;
        const POP_FRAMES = 36;

        function easeOutBack(t) {
            const c1 = 1.70158;
            const c3 = c1 + 1;
            return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
        }

        const picks = [308, 105, 344, 777, 192, 537, 541, 838, 485, 429, 327, 668, 84, 139, 297, 453, 225, 799, 797, 165, 696, 523, 560, 489, 768, 321, 361, 247, 336, 250, 861, 750, 268, 643, 911, 715, 725, 865, 36, 55, 394, 625, 277, 828, 755, 575, 22, 805, 525, 721, 384, 494, 887, 508, 939, 931, 46, 847, 526, 335, 661, 607, 677, 579, 154, 985, 917, 651, 218, 265, 685, 664, 414, 957, 889, 504, 627, 674, 617, 653, 873, 244, 97, 322, 289, 612, 483, 597, 195, 381, 87, 742, 754, 492, 633, 389, 332, 928, 816, 534, 573, 982, 763, 313, 16, 41, 800, 962, 12, 170, 738, 720, 248, 239, 922, 642, 961, 773, 228, 180, 588, 366, 521, 830, 562, 179, 722, 752, 935, 285, 181, 954, 687, 417, 723, 408, 531, 626, 119, 747, 645, 398, 464, 994, 503, 546, 110, 553, 199, 624, 206, 710, 253, 423, 860, 925, 783, 727, 166, 316, 641, 281, 432, 1, 371, 226, 201, 411, 610, 467, 246, 462, 479, 259, 884, 807, 706, 913, 656, 517, 792, 632, 993, 646, 117, 1000, 373, 57, 859, 711, 487, 34, 70, 697, 787, 440, 157, 959, 716, 198, 829, 765, 469, 846, 558, 401, 161, 585, 718, 856, 551, 965, 120, 990, 845, 839, 112, 979, 814, 341, 864, 379, 375, 61, 817, 7, 574, 77, 222, 325, 934, 886, 712, 300, 8, 158, 647, 472, 86, 556, 20, 416, 236, 480, 58, 746, 402, 280, 621, 355, 874, 103, 771, 708, 442, 303, 147, 862, 790, 383, 40, 420, 95, 406, 547, 264, 734, 125, 358, 522, 81, 107, 32, 502, 530, 255, 596, 682, 605, 43, 169, 436, 969, 3, 129, 193, 902, 876, 116, 670, 369, 45, 919, 458, 124, 804, 446, 328, 992, 284, 528, 343, 940, 739, 329, 671, 159, 806, 184, 703, 841, 396, 101, 888, 649, 242, 640, 511, 445, 434];
        const cells = COLS * ROWS;

        function det(i, k) {
            const x = Math.sin((i + 1) * 127.1 + (k + 1) * 311.7) * 43758.5453;
            return x - Math.floor(x);
        }

        const revealOrder = picks.map((_, i) => i).sort((a, b) => det(a, 99) - det(b, 99));

        const floats = picks.map((_, i) => ({
            ax: 0.01 + 0.012 * det(i, 0),
            ay: 0.014 + 0.016 * det(i, 1),
            sx: 0.008 + 0.012 * det(i, 2),
            sy: 0.008 + 0.012 * det(i, 3),
            px: 2 * Math.PI * det(i, 4),
            py: 2 * Math.PI * det(i, 5),
            as: 0.02 + 0.03 * det(i, 6),
            ss: 0.006 + 0.01 * det(i, 7),
            ps: 2 * Math.PI * det(i, 8),
        }));

            Promise.all(picks.map((n) => loadImage(`https://ipfs.io/ipfs/Qmb195Z9XLptpKy3oyUxeLupCQE9eDUrXkiz8xQuSK1GwV/window-${n}.webp`))).then((images) => {
                const count = COLS * ROWS;

                const span = TOTAL_FRAMES - POP_FRAMES;
                const startFrame = new Array(count);
                revealOrder.forEach((cell, order) => {
                    startFrame[cell] = count > 1 ? Math.round((order / (count - 1)) * span) : 0;
                });

                function render(frame) {
                    ctx.fillStyle = "#000";
                    ctx.fillRect(0, 0, W, H);

                    for (let gy = 0; gy < ROWS; gy++) {
                        for (let gx = 0; gx < COLS; gx++) {
                            const i = gy * COLS + gx;
                            const t = (frame - startFrame[i]) / POP_FRAMES;
                            if (t < 0) continue;

                            const scale = t >= 1 ? 1 : easeOutBack(t);
                            if (scale <= 0) continue;

                            const x = gx * cellW;
                            const y = gy * cellH;
                            const cx = x + cellW / 2;
                            const cy = y + cellH / 2;
                            ctx.drawImage(
                                images[i],
                                cx - (cellW * scale) / 2,
                                cy - (cellH * scale) / 2,
                                cellW * scale,
                                cellH * scale
                            );
                        }
                    }
                }

                function renderFloat(f, k) {
                    ctx.fillStyle = "#000";
                    ctx.fillRect(0, 0, W, H);

                    for (let gy = 0; gy < ROWS; gy++) {
                        for (let gx = 0; gx < COLS; gx++) {
                            const i = gy * COLS + gx;
                            const fl = floats[i];
                            const x = gx * cellW;
                            const y = gy * cellH;
                            const offX = fl.ax * cellW * Math.sin(f * fl.sx + fl.px) * k;
                            const offY = fl.ay * cellH * Math.sin(f * fl.sy + fl.py) * k;
                            const swell = 1 + fl.as * Math.sin(f * fl.ss + fl.ps) * k;
                            const w = cellW * swell;
                            const h = cellH * swell;
                            ctx.drawImage(
                                images[i],
                                x + offX + (cellW - w) / 2,
                                y + offY + (cellH - h) / 2,
                                w,
                                h
                            );
                        }
                    }
                }

                function scaleAtFrame(rf, i) {
                    const t = (rf - startFrame[i]) / POP_FRAMES;
                    if (t < 0) return 0;
                    return t >= 1 ? 1 : easeOutBack(t);
                }

                const SNAP_FRAMES = 24;
                let snapScales = null;
                function renderSnap(t) {
                    ctx.fillStyle = "#000";
                    ctx.fillRect(0, 0, W, H);

                    const eased = t >= 1 ? 1 : easeOutBack(t);
                    for (let gy = 0; gy < ROWS; gy++) {
                        for (let gx = 0; gx < COLS; gx++) {
                            const i = gy * COLS + gx;
                            const scale = snapScales[i] + (1 - snapScales[i]) * eased;
                            if (scale <= 0) continue;
                            const x = gx * cellW;
                            const y = gy * cellH;
                            const cx = x + cellW / 2;
                            const cy = y + cellH / 2;
                            ctx.drawImage(
                                images[i],
                                cx - (cellW * scale) / 2,
                                cy - (cellH * scale) / 2,
                                cellW * scale,
                                cellH * scale
                            );
                        }
                    }
                }

                let state = "reveal";
                let frame = 0;
                let floatFrame = 0;
                let calmStartK = 1;
                const PAUSE_FRAMES = 30;
                const RAMP_FRAMES = 60;

                const ZOOM_FRAMES = 72;
                let baseState = "settled";

                function easeInOutCubic(t) {
                    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
                }

                function renderBase() {
                    if (baseState === "alive") {
                        renderFloat(floatFrame, Math.min(floatFrame / RAMP_FRAMES, 1));
                        floatFrame++;
                    } else {
                        render(TOTAL_FRAMES);
                    }
                }

                const ZOOM_LEVEL = 0.5;
                const GRID_VIEW = { x: W / 2, y: H / 2, vw: W };
                let cam = { ...GRID_VIEW };
                let zoomTarget = null;
                let zoomFrom = null;

                let vel = { x: 0, y: 0 };
                const FRICTION = 0.9;
                const MIN_VEL = 0.2;

                function renderView(c) {
                    const s = W / c.vw;
                    ctx.setTransform(s, 0, 0, s, W / 2 - c.x * s, H / 2 - c.y * s);
                    renderBase();
                    ctx.setTransform(1, 0, 0, 1, 0, 0);
                }

                function renderZoomLeg(from, to, u) {
                    const e = easeInOutCubic(u);
                    cam = {
                        x: from.x + (to.x - from.x) * e,
                        y: from.y + (to.y - from.y) * e,
                        vw: from.vw + (to.vw - from.vw) * e,
                    };
                    renderView(cam);
                }

                function clampAxis(v, half, max) {
                    if (half * 2 >= max) return max / 2;
                    return Math.min(Math.max(v, half), max - half);
                }
                function clampCam() {
                    const vh = cam.vw * (H / W);
                    cam.x = clampAxis(cam.x, cam.vw / 2, W);
                    cam.y = clampAxis(cam.y, vh / 2, H);
                }

                function tick() {
                    if (state === "reveal") {
                        render(frame);
                        if (frame >= TOTAL_FRAMES) {
                            state = "settled";
                            running = false;
                            return;
                        }
                        frame++;
                    } else if (state === "out") {
                        render(TOTAL_FRAMES - frame);
                        if (frame >= TOTAL_FRAMES) {
                            state = "pause";
                            frame = 0;
                        } else {
                            frame++;
                        }
                    } else if (state === "pause") {
                        render(-1);
                        if (frame >= PAUSE_FRAMES) {
                            state = "in";
                            frame = 0;
                        } else {
                            frame++;
                        }
                    } else if (state === "in") {
                        render(frame);
                        if (frame >= TOTAL_FRAMES) {
                            state = "hold";
                            frame = 0;
                        } else {
                            frame++;
                        }
                    } else if (state === "hold") {
                        render(TOTAL_FRAMES);
                        if (frame >= PAUSE_FRAMES) {
                            state = "out";
                            frame = 0;
                        } else {
                            frame++;
                        }
                    } else if (state === "snap") {
                        renderSnap(frame / SNAP_FRAMES);
                        if (frame >= SNAP_FRAMES) {
                            state = "alive";
                            floatFrame = 0;
                        } else {
                            frame++;
                        }
                    } else if (state === "alive") {
                        const k = Math.min(floatFrame / RAMP_FRAMES, 1);
                        renderFloat(floatFrame, k);
                        floatFrame++;
                    } else if (state === "calm") {
                        const k = calmStartK * Math.max(1 - frame / RAMP_FRAMES, 0);
                        renderFloat(floatFrame, k);
                        floatFrame++;
                        if (frame >= RAMP_FRAMES) {
                            render(TOTAL_FRAMES);
                            state = "settled";
                            running = false;
                            return;
                        }
                        frame++;
                    } else if (state === "zoomin") {
                        renderZoomLeg(zoomFrom, zoomTarget, frame / ZOOM_FRAMES);
                        if (frame >= ZOOM_FRAMES) {
                            state = "zoomed";
                        } else {
                            frame++;
                        }
                    } else if (state === "zoomed") {
                        if (!drag && (Math.abs(vel.x) > MIN_VEL || Math.abs(vel.y) > MIN_VEL)) {
                            const wantX = cam.x + vel.x;
                            const wantY = cam.y + vel.y;
                            cam.x = wantX;
                            cam.y = wantY;
                            clampCam();
                            if (cam.x !== wantX) vel.x = 0;
                            if (cam.y !== wantY) vel.y = 0;
                            vel.x *= FRICTION;
                            vel.y *= FRICTION;
                        } else if (!drag) {
                            vel.x = 0;
                            vel.y = 0;
                        }
                        renderView(cam);
                    } else if (state === "zoomout") {
                        renderZoomLeg(zoomFrom, GRID_VIEW, frame / ZOOM_FRAMES);
                        if (frame >= ZOOM_FRAMES) {
                            state = baseState;
                            if (state === "settled") {
                                render(TOTAL_FRAMES);
                                running = false;
                                return;
                            }
                        } else {
                            frame++;
                        }
                    }
                }

                const targetInterval = 1000 / FPS;
                const FRAME_EPSILON = 5;
                let running = false;
                let lastTargetFrameTime = 0;

                function loop(now) {
                    if (!running) return;
                    requestAnimationFrame(loop);
                    if (now - lastTargetFrameTime >= targetInterval - FRAME_EPSILON) {
                        lastTargetFrameTime = Math.max(lastTargetFrameTime + targetInterval, now);
                        tick();
                    }
                }
                function startLoop() {
                    if (running) return;
                    running = true;
                    lastTargetFrameTime = 0;
                    requestAnimationFrame(loop);
                }
                startLoop();

                const LONG_PRESS_MS = 500;
                const MOVE_TOLERANCE = 10;
                let pressTimer = null;
                let longPressFired = false;
                let pressPos = null;

                function cellAt(clientX, clientY) {
                    const rect = canvas.getBoundingClientRect();
                    const px = (clientX - rect.left) * (W / rect.width);
                    const py = (clientY - rect.top) * (H / rect.height);
                    const gx = Math.floor(px / cellW);
                    const gy = Math.floor(py / cellH);
                    if (gx < 0 || gx >= COLS || gy < 0 || gy >= ROWS) return null;
                    return { x: gx * cellW, y: gy * cellH };
                }

                function cancelPress() {
                    clearTimeout(pressTimer);
                    pressPos = null;
                }

                let drag = null;
                let suppressClick = false;
                let lastMoveT = 0;
                let lastPointerType = "mouse";

                function endDrag() {
                    if (drag) {
                        if (drag.moved) suppressClick = true;
                        if (performance.now() - lastMoveT > 80) {
                            vel.x = 0;
                            vel.y = 0;
                        }
                    }
                    drag = null;
                }

                canvas.addEventListener("pointerdown", (e) => {
                    longPressFired = false;
                    lastPointerType = e.pointerType || "mouse";
                    if (e.button !== 0) return;
                    if (state === "zoomed") {
                        vel.x = 0;
                        vel.y = 0;
                        drag = { x: e.clientX, y: e.clientY, camX: cam.x, camY: cam.y, moved: false };
                        lastMoveT = performance.now();
                        canvas.setPointerCapture(e.pointerId);
                        return;
                    }
                    if (state !== "settled" && state !== "alive") return;
                    const cell = cellAt(e.clientX, e.clientY);
                    if (!cell) return;
                    pressPos = { x: e.clientX, y: e.clientY };
                    clearTimeout(pressTimer);
                    pressTimer = setTimeout(() => {
                        longPressFired = true;
                        baseState = state;
                        zoomFrom = { ...GRID_VIEW };
                        const tvw = cellW / ZOOM_LEVEL;
                        const tvh = tvw * (H / W);
                        zoomTarget = {
                            x: clampAxis(cell.x + cellW / 2, tvw / 2, W),
                            y: clampAxis(cell.y + cellH / 2, tvh / 2, H),
                            vw: tvw,
                        };
                        state = "zoomin";
                        frame = 0;
                        vel.x = 0;
                        vel.y = 0;
                        startLoop();
                    }, LONG_PRESS_MS);
                });
                canvas.addEventListener("pointermove", (e) => {
                    if (drag) {
                        const rect = canvas.getBoundingClientRect();
                        const worldPerPx = cam.vw / rect.width;
                        const dx = e.clientX - drag.x;
                        const dy = e.clientY - drag.y;
                        if (Math.hypot(dx, dy) > MOVE_TOLERANCE) drag.moved = true;
                        const prevX = cam.x;
                        const prevY = cam.y;
                        cam.x = drag.camX - dx * worldPerPx;
                        cam.y = drag.camY - dy * worldPerPx;
                        clampCam();
                        vel.x = (cam.x - prevX) * 0.6 + vel.x * 0.4;
                        vel.y = (cam.y - prevY) * 0.6 + vel.y * 0.4;
                        lastMoveT = performance.now();
                        return;
                    }
                    if (!pressPos) return;
                    if (Math.hypot(e.clientX - pressPos.x, e.clientY - pressPos.y) > MOVE_TOLERANCE) {
                        cancelPress();
                    }
                });
                canvas.addEventListener("pointerup", () => {
                    cancelPress();
                    endDrag();
                });
                canvas.addEventListener("pointercancel", () => {
                    cancelPress();
                    endDrag();
                });
                canvas.addEventListener("pointerleave", cancelPress);
                canvas.addEventListener("contextmenu", (e) => {
                    if (lastPointerType === "touch") e.preventDefault();
                });
                canvas.style.touchAction = "none";

                canvas.addEventListener(
                    "wheel",
                    (e) => {
                        if (state !== "zoomed") return;
                        e.preventDefault();
                        const rect = canvas.getBoundingClientRect();
                        const worldPerPx = cam.vw / rect.width;
                        cam.x += e.deltaX * worldPerPx;
                        cam.y += e.deltaY * worldPerPx;
                        clampCam();
                    },
                    { passive: false }
                );

                canvas.addEventListener("click", () => {
                    if (suppressClick) {
                        suppressClick = false;
                        return;
                    }
                    if (longPressFired) {
                        longPressFired = false;
                        return;
                    }
                    if (state === "zoomed" || state === "zoomin") {
                        zoomFrom = { ...cam };
                        state = "zoomout";
                        frame = 0;
                        return;
                    }
                    if (state === "settled") {
                        state = "out";
                        frame = 0;
                        startLoop();
                    } else if (state === "out" || state === "pause" || state === "in" || state === "hold") {
                        const rf =
                            state === "out" ? TOTAL_FRAMES - frame :
                                state === "pause" ? -1 :
                                    state === "in" ? frame :
                                        TOTAL_FRAMES;
                        snapScales = picks.map((_, i) => scaleAtFrame(rf, i));
                        state = "snap";
                        frame = 0;
                    } else if (state === "alive") {
                        calmStartK = Math.min(floatFrame / RAMP_FRAMES, 1);
                        state = "calm";
                        frame = 0;
                    }
                });
            });
    </script>
</body>

</html>
